<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURO-VISION // GLOBAL ANYCAST ROUTING CONSOLE</title>
    <!-- Premium Interactive Graph Rendering Core Dependency -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.7);
            --border: rgba(6, 182, 212, 0.2);
            --neon: #06b6d4;
            --text: #f3f4f6;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg);
            font-family: 'Courier New', Courier, monospace; color: var(--text);
            overflow: hidden;
        }
        .app-wrapper {
            display: flex; height: 100vh; width: 100vw;
        }
        .control-side {
            width: 380px; background: var(--panel); border-right: 1px solid var(--border);
            backdrop-filter: blur(12px); padding: 25px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }
        .graph-side {
    flex-grow: 1;
    position: relative;
    background: radial-gradient(circle at center, #0b1528 0%, #030712 100%);
    min-height: 100vh; /* Forces the panel to take full screen height */
}
       #network-canvas {
    width: 100%;
    height: 100vh; /* Ensures the canvas fills the entire panel area */
    position: absolute;
    top: 0;
    left: 0;
}
        .card h2 { font-size: 12px; margin: 0 0 10px 0; color: #9ca3af; letter-spacing: 1px;}
        label { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 5px; }
        select {
            width: 100%; background: #1f2937; border: 1px solid var(--border);
            color: white; padding: 8px; font-family: monospace; font-size: 12px;
            border-radius: 4px; outline: none; margin-bottom: 12px;
        }
        button {
            width: 100%; background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border: none; color: black; font-weight: bold; padding: 12px;
            font-family: monospace; font-size: 13px; border-radius: 4px;
            cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .metric { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px;}
        .metric .val { font-weight: bold; color: var(--neon); }
        .path-box { font-size: 11px; background: rgba(6, 182, 212, 0.05); padding: 10px; border-radius: 4px; border: 1px dashed var(--border); line-height: 1.4; max-height: 80px; overflow-y: auto;}
        .status-pill { display: inline-block; padding: 2px 6px; font-size: 9px; border-radius: 3px; font-weight: bold; }
        .status-online { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-offline { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="control-side">
        <div>
            <h1>NEURO-VISION</h1>
            <p class="subtitle">GLOBAL DATA CDN OPTIMIZATION MANAGEMENT LAYER</p>
        </div>

        <div class="card">
            <h2>TRAFFIC SIMULATOR</h2>
            <label>Origin Consumer Node</label>
            <select id="sourceNode">
                {% for id, node in nodes.items() %}
                    <option value="{{ id }}">{{ node.name }} [{{ node.region }}]</option>
                {% endfor %}
            </select>

            <label>Target Content Cluster</label>
            <select id="destNode">
                {% for id, node in nodes.items() %}
                    <option value="{{ id }}" {% if id == 4 %}selected{% endif %}>{{ node.name }} [{{ node.region }}]</option>
                {% endfor %}
            </select>

            <label>Simulate Server Node Outage (Kill Switch)</label>
            <select id="killNode">
                <option value="-1">ALL SYSTEMS OPERATIONAL</option>
                {% for id, node in nodes.items() %}
                    <option value="{{ id }}">KILL: {{ node.name }}</option>
                {% endfor %}
            </select>

            <button onclick="computeOptimalPath()">ROUTE TRAFFIC PATH</button>
        </div>

        <div class="card">
            <h2>TELEMETRY TELEMETRICS</h2>
            <div class="metric"><span>Path Cost Latency:</span><span id="m-lat" class="val">--</span></div>
            <div class="metric"><span>Calculated Throughput:</span><span id="m-flow" class="val" style="color: #10b981;">--</span></div>
            <div class="metric"><span>Routing Health Status:</span><span id="m-status"><span class="status-pill status-online">STABLE</span></span></div>
            <div style="margin-top:12px;">
                <label>ACTIVE LOGGED PATH SEQUENCE:</label>
                <div id="m-path" class="path-box">System idle. Awaiting transmission request...</div>
            </div>
        </div>
    </div>

    <div class="graph-side">
        <div id="network-canvas"></div>
    </div>
</div>

<script>
    let network = null;
    let nodesDataset = null;
    let edgesDataset = null;

    // Topology Map Definition Coordinates
    const baseNodes = [
        { id: 0, label: "San Francisco\n[US-West]", x: -350, y: -100, shape: "dot", color: { background: "#1f2937", border: "#06b6d4" } },
        { id: 1, label: "New York\n[US-East]",     x: -150, y: -150, shape: "dot", color: { background: "#1f2937", border: "#06b6d4" } },
        { id: 2, label: "London\n[UK-Europe]",    x: 50,   y: -180, shape: "dot", color: { background: "#1f2937", border: "#06b6d4" } },
        { id: 3, label: "Frankfurt\n[EU-Central]", x: 200,  y: -80,  shape: "dot", color: { background: "#1f2937", border: "#06b6d4" } },
        { id: 4, label: "Bengaluru\n[Asia-South]", x: 100,  y: 150,  shape: "dot", color: { background: "#1f2937", border: "#06b6d4" } },
        { id: 5, label: "Tokyo\n[Asia-East]",      x: -150, y: 120,  shape: "dot", color: { background: "#1f2937", border: "#06b6d4" } }
    ];

    const baseEdges = [
        { from: 0, to: 1, label: "45ms", width: 2, color: { color: "rgba(6,182,212,0.3)" } },
        { from: 0, to: 5, label: "80ms", width: 2, color: { color: "rgba(6,182,212,0.3)" } },
        { from: 1, to: 2, label: "55ms", width: 2, color: { color: "rgba(6,182,212,0.3)" } },
        { from: 2, to: 3, label: "15ms", width: 2, color: { color: "rgba(6,182,212,0.3)" } },
        { from: 2, to: 4, label: "110ms", width: 2, color: { color: "rgba(6,182,212,0.3)" } },
        { from: 3, to: 4, label: "95ms", width: 2, color: { color: "rgba(6,182,212,0.3)" } },
        { from: 4, to: 5, label: "65ms", width: 2, color: { color: "rgba(6,182,212,0.3)" } }
    ];

    function initNetwork() {
        nodesDataset = new vis.DataSet(baseNodes);
        edgesDataset = new vis.DataSet(baseEdges);

        const container = document.getElementById('network-canvas');
        const data = { nodes: nodesDataset, edges: edgesDataset };
        const options = {
            physics: false,
            nodes: { font: { color: '#f3f4f6', face: 'monospace', size: 11 }, size: 22 },
            edges: { font: { color: '#6b7280', face: 'monospace', size: 10, align: 'top' }, arrows: { to: { enabled: false } } }
        };
        network = new vis.Network(container, data, options);
    }

    function computeOptimalPath() {
        const src = document.getElementById("sourceNode").value;
        const dest = document.getElementById("destNode").value;
        const dead = document.getElementById("killNode").value;

        fetch('/route-traffic', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: src, destination: dest, dead_node: dead })
        })
        .then(res => res.json())
        .then(data => {
            // Reset node/edge styling to default clean layout configuration
            const updatedNodes = baseNodes.map(n => {
                let colorSetup = { background: "#1f2937", border: "#06b6d4" };
                if (n.id == dead) colorSetup = { background: "#450a0a", border: "#ef4444" };
                return { ...n, color: colorSetup };
            });
            nodesDataset.update(updatedNodes);

            const updatedEdges = baseEdges.map(e => ({ ...e, width: 2, color: { color: "rgba(6,182,212,0.3)" }, arrows: "" }));
            edgesDataset.update(updatedEdges);

            if (data.success) {
                document.getElementById("m-lat").innerText = data.latency;
                document.getElementById("m-flow").innerText = data.throughput;
                document.getElementById("m-path").innerText = data.path_display;
                document.getElementById("m-status").innerHTML = '<span class="status-pill status-online">STABLE</span>';

                // Highlight nodes along the active path calculated by the C algorithm
                data.path_nodes.forEach(nid => {
                    if(nid != dead) {
                        nodesDataset.update({ id: nid, color: { background: "#06b6d4", border: "#fff" } });
                    }
                });

                // Style active connection pathways using animated arrows
                for(let i=0; i < data.path_nodes.length - 1; i++) {
                    const u = data.path_nodes[i];
                    const v = data.path_nodes[i+1];
                    
                    const match = edgesDataset.get({
                        filter: function (item) {
                            return (item.from == u && item.to == v) || (item.from == v && item.to == u);
                        }
                    });

                    if(match.length > 0) {
                        edgesDataset.update({
                            id: match[0].id,
                            width: 5,
                            color: { color: "#10b981" },
                            arrows: (match[0].from == u) ? "to" : "from"
                        });
                    }
                }
            } else {
                document.getElementById("m-lat").innerText = "--";
                document.getElementById("m-flow").innerText = "--";
                document.getElementById("m-path").innerText = data.error;
                document.getElementById("m-status").innerHTML = '<span class="status-pill status-offline">OUTAGE DETECTED</span>';
            }
        });
    }

    window.onload = initNetwork;
</script>
</body>
</html>
